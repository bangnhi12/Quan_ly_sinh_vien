{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="mb-4">
        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Quay lại Dashboard
        </a>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-primary text-white py-3">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-plus-square me-2"></i>THÊM KHOA MỚI</h6>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="form_type" value="add">
                        <div class="mb-3">
                            <label class="small fw-bold">Mã Khoa</label>
                            <input type="text" name="ma_khoa" class="form-control border-2" placeholder="Ví dụ: AT" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Tên Khoa</label>
                            <input type="text" name="ten_khoa" class="form-control border-2" placeholder="Ví dụ: Công nghệ thông tin" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">LƯU KHOA</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">Mã Khoa</th>
                                <th>Tên Khoa</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for k in all_khoas %}
                            <tr>
                                <td class="ps-4 fw-bold text-primary">{{ k.MaKhoa }}</td>
                                <td>{{ k.TenKhoa }}</td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#editKhoa{{ k.MaKhoa }}">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <a href="{{ url_for('admin.delete_khoa', ma_khoa=k.MaKhoa) }}" 
                                       class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa khoa này sẽ mất các dữ liệu liên quan. Bạn chắc chứ?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

{% for k in all_khoas %}
<div class="modal fade" id="editKhoa{{ k.MaKhoa }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form method="POST" class="modal-content">
            <input type="hidden" name="form_type" value="edit">
            <input type="hidden" name="ma_khoa_old" value="{{ k.MaKhoa }}">
            <div class="modal-header bg-warning">
                <h5 class="fw-bold mb-0">Sửa Khoa: {{ k.MaKhoa }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-start">
                <div class="mb-3">
                    <label class="small fw-bold">Tên Khoa mới</label>
                    <input type="text" name="ten_khoa" class="form-control border-2" value="{{ k.TenKhoa }}" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-warning fw-bold">CẬP NHẬT</button>
            </div>
        </form>
    </div>
</div>
{% endfor %}
{% endblock %}
