{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="mb-4">
        <a href="{{ url_for('admin_mon.list_mon') }}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
    </div>

    <div class="card border-0 shadow-sm rounded-4" style="max-width: 800px; margin: 0 auto;">
        <div class="card-header bg-info text-white fw-bold py-3">
            <i class="bi bi-pencil-square me-2"></i>Chỉnh Sửa Môn Học: {{ mon_hoc.MaMon }}
        </div>
        <form method="post" class="card-body p-5">
            <div class="mb-4">
                <label class="form-label fw-bold">Mã Môn</label>
                <input type="text" class="form-control form-control-lg" value="{{ mon_hoc.MaMon }}" disabled>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Tên Môn <span class="text-danger">*</span></label>
                <input type="text" name="ten_mon" class="form-control form-control-lg" value="{{ mon_hoc.TenMon }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Số Tín Chỉ <span class="text-danger">*</span></label>
                <input type="number" name="so_tin_chi" class="form-control form-control-lg" value="{{ mon_hoc.SoTinChi }}" min="1" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Học Kỳ</label>
                <select name="hoc_ky" class="form-select form-select-lg">
                    <option value="">-- Chọn học kỳ --</option>
                    {% for i in range(1, 9) %}
                    <option value="{{ i }}" {% if mon_hoc.HocKy == i %}selected{% endif %}>Kỳ {{ i }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Mô Tả</label>
                <textarea name="mo_ta" class="form-control" rows="4">{{ mon_hoc.MoTa or '' }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Trạng Thái</label>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="trang_thai" id="trang_thai" {% if mon_hoc.TrangThai %}checked{% endif %}>
                    <label class="form-check-label" for="trang_thai">Hoạt động</label>
                </div>
            </div>

            <div class="d-flex gap-2 justify-content-center mt-5">
                <a href="{{ url_for('admin_mon.list_mon') }}" class="btn btn-secondary btn-lg px-5">Hủy</a>
                <button type="submit" class="btn btn-info btn-lg px-5"><i class="bi bi-check-lg me-1"></i>Cập Nhật</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
