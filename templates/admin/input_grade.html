{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-uppercase text-danger mb-0">
                    <i class="bi bi-mortarboard-fill me-2"></i>Nhập điểm GPA tốt nghiệp
                </h4>
                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm shadow-sm">
                    <i class="bi bi-arrow-left"></i> Quay lại Dashboard
                </a>
            </div>

            <div class="card shadow-sm border-0 rounded-4 p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold small text-muted text-uppercase">Chọn sinh viên</label>
                            <select name="ma_sv" class="form-select form-select-lg border-0 bg-light" required>
                                <option value="">-- Danh sách sinh viên --</option>
                                {% for sv in dssv %}
                                    <option value="{{ sv.MaSV }}">{{ sv.MaSV }} - {{ sv.HoTen }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-12 mt-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Điểm GPA tích lũy (Hệ 4.0)</label>
                            <input type="number" step="0.01" min="0" max="4" name="gpa" 
                                   class="form-control form-control-lg border-0 bg-light" 
                                   placeholder="Ví dụ: 3.52" required>
                            <div class="form-text mt-2">
                                <i class="bi bi-info-circle me-1"></i> Hệ thống sẽ tự động tính toán xếp loại dựa trên số điểm này.
                            </div>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-danger w-100 py-3 fw-bold text-uppercase shadow-sm">
                                Xác nhận và Lưu kết quả
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="mt-4 p-3 bg-light rounded-3 border-start border-danger border-4">
               
            </div>
        </div>
    </div>
</div>
{% endblock %}
