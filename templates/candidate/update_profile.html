{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-white border-0 pt-4 text-center">
                <i class="bi bi-person-vcard text-danger" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mt-2">CẬP NHẬT HỒ SƠ CÁ NHÂN</h4>
                <p class="text-muted small">Vui lòng cung cấp thông tin chính xác theo căn cước công dân.</p>
            </div>
            
            <div class="card-body p-4 p-sm-5">
                <form action="{{ url_for('candidate.update_profile') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="fullname" class="form-label fw-bold small">Họ và tên (có dấu)</label>
                        <input type="text" name="fullname" id="fullname" 
                               class="form-control form-control-lg bg-light border-0" 
                               value="{{ hso.HoTen if hso else '' }}" 
                               placeholder="Nguyễn Văn A" required>
                    </div>

                    <div class="mb-3">
                        <label for="cccd" class="form-label fw-bold small">Số CMND/CCCD (12 số)</label>
                        <input type="text" name="cccd" id="cccd" 
                               class="form-control form-control-lg bg-light border-0" 
                               value="{{ hso.CCCD if hso and 'TEMP' not in hso.CCCD else '' }}" 
                               placeholder="Nhập 12 số CCCD" 
                               pattern="\d{12}" title="Vui lòng nhập đúng 12 chữ số" required>
                    </div>

                    <div class="mb-4">
                        <label for="sdt" class="form-label fw-bold small">Số điện thoại liên hệ</label>
                        <input type="tel" name="sdt" id="sdt" 
                               class="form-control form-control-lg bg-light border-0" 
                               value="{{ hso.SDT if hso and 'TEMP' not in hso.SDT else '' }}" 
                               placeholder="09xx xxx xxx" 
                               pattern="[0-9]{10,11}" title="Vui lòng nhập 10-11 chữ số" required>
                    </div>

                    <div class="alert alert-info py-2 small border-0">
                        <i class="bi bi-info-circle-fill me-2"></i> 
                        Thông tin này sẽ được dùng để in trên giấy báo nhập học.
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-ptit btn-lg fw-bold shadow-sm">
                            LƯU THÔNG TIN
                        </button>
                        <a href="{{ url_for('candidate.dashboard') }}" class="btn btn-outline-secondary">
                            Quay lại Bảng điều khiển
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
