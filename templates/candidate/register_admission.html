{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9 col-lg-8">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-white border-0 pt-4 text-center">
                <i class="bi bi-journal-check text-primary" style="font-size: 3rem;"></i>
                <h4 class="fw-bold mt-2">ĐĂNG KÝ XÉT TUYỂN</h4>
                <p class="text-muted small">Vui lòng chọn ngành và phương thức xét tuyển phù hợp.</p>
            </div>
            
            <div class="card-body p-4 p-sm-5">
                <form action="{{ url_for('candidate.register_admission') }}" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold small">Ngành đăng ký</label>
                        <select name="ma_nganh" class="form-select form-select-lg bg-light border-0 shadow-none" required>
                            <option value="" selected disabled>-- Chọn ngành học --</option>
                            {% for n in ds_nganh %}
                            <option value="{{ n.MaNganh }}">{{ n.TenNganh }} ({{ n.MaNganh }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small">Phương thức xét tuyển</label>
                        <select name="loai_pt" id="loai_pt" class="form-select form-select-lg bg-light border-0 shadow-none" onchange="toggleAdmissionFields()" required>
                            <option value="" selected disabled>-- Chọn phương thức --</option>
                            <option value="DGNL">Đánh giá năng lực</option>
                            <option value="HOCBA_IELTS">Học bạ kết hợp IELTS</option>
                            <option value="THPT">Điểm thi THPT (Tốt nghiệp)</option>
                        </select>
                    </div>

                    <hr class="my-4 opacity-25">

                    <div id="common_score" class="mb-4" style="display:none;">
                        <label id="label_diem_tong" class="form-label fw-bold small">Điểm xét tuyển</label>
                        <input type="number" step="0.01" name="diem" class="form-control form-control-lg bg-light border-0" placeholder="0.00">
                    </div>

                    <div id="group_dgnl" class="mb-4" style="display:none;">
                        <label class="form-label fw-bold small">Minh chứng kết quả DGNL (File PDF/Ảnh)</label>
                        <input type="file" name="file_dgnl" class="form-control bg-light border-0">
                    </div>

                    <div id="group_hocba_ielts" style="display:none;">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Điểm IELTS</label>
                                <input type="number" step="0.1" name="diem_ielts" class="form-control form-control-lg bg-light border-0" placeholder="Ví dụ: 6.5">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">File chứng chỉ IELTS</label>
                                <input type="file" name="file_ielts" class="form-control bg-light border-0">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">File học bạ (Bản scan PDF)</label>
                            <input type="file" name="file_hocba" class="form-control bg-light border-0">
                        </div>
                    </div>

                    <div class="alert alert-warning py-2 small border-0 shadow-sm mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> 
                        Lưu ý: File minh chứng phải rõ nét, định dạng PDF hoặc hình ảnh (JPG, PNG).
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg fw-bold shadow-sm rounded-3">
                            GỬI HỒ SƠ ĐĂNG KÝ
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="mt-4">
        <a href="{{ url_for('candidate.dashboard') }}" class="btn btn-link text-decoration-none text-muted">
            <i class="bi bi-arrow-left me-1"></i> Quay lại Dashboard
        </a>
    </div>
<script>
function toggleAdmissionFields() {
    const pt = document.getElementById('loai_pt').value;
    const labelDiem = document.getElementById('label_diem_tong');
    
    // Hiển thị khung nhập điểm chung
    document.getElementById('common_score').style.display = pt ? 'block' : 'none';
    
    // Reset hiển thị các nhóm
    document.getElementById('group_dgnl').style.display = 'none';
    document.getElementById('group_hocba_ielts').style.display = 'none';

    if (pt === 'DGNL') {
        labelDiem.innerText = "Điểm bài thi Đánh giá năng lực:";
        document.getElementById('group_dgnl').style.display = 'block';
    } else if (pt === 'HOCBA_IELTS') {
        labelDiem.innerText = "Điểm trung bình Học bạ:";
        document.getElementById('group_hocba_ielts').style.display = 'block';
    } else if (pt === 'THPT') {
        labelDiem.innerText = "Tổng điểm 3 môn xét tuyển (THPT):";
    }
}
</script>
{% endblock %}
