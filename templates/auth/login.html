{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">ĐĂNG NHẬP</h3>
                    <p class="text-muted small">Vui lòng sử dụng tài khoản đã được cấp hoặc tài khoản thí sinh để truy cập.</p>
                </div>

                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-person-fill text-muted"></i>
                            </span>
                            <input type="text" name="username" id="username" 
                                   class="form-control border-start-0 bg-light" 
                                   placeholder="Username" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="bi bi-lock-fill text-muted"></i>
                            </span>
                            <input type="password" name="password" id="password" 
                                   class="form-control border-start-0 bg-light" 
                                   placeholder="Password" required>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-ptit btn-lg fw-bold shadow-sm">
                            ĐĂNG NHẬP
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-1">Dành cho thí sinh mới?</p>
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold text-danger">
                        Đăng ký xét tuyển ngay
                    </a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left"></i> Quay lại trang chủ
            </a>
        </div>
    </div>
</div>
{% endblock %}
