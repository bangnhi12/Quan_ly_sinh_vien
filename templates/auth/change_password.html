{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <div class="mb-2">
                        <i class="bi bi-shield-lock text-danger" style="font-size: 3rem;"></i>
                    </div>
                    <h3 class="fw-bold">ĐỔI MẬT KHẨU</h3>
                    <p class="text-muted small">Bạn nên sử dụng mật khẩu mạnh để bảo vệ tài khoản cá nhân.</p>
                </div>

                <form action="{{ url_for('auth.change_password') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                        <input type="password" name="old_password" class="form-control bg-light" 
                               placeholder="Nhập mật khẩu đang dùng" required>
                    </div>

                    <hr class="my-3 text-muted">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu mới</label>
                        <input type="password" name="new_password" class="form-control bg-light" 
                               placeholder="Nhập mật khẩu mới" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                        <input type="password" name="confirm_password" class="form-control bg-light" 
                               placeholder="Nhập lại mật khẩu mới" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-ptit btn-lg fw-bold shadow-sm">
                            CẬP NHẬT NGAY
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.querySelector('form');
    form.onsubmit = function(e) {
        const newPass = document.getElementsByName('new_password')[0].value;
        const confirmPass = document.getElementsByName('confirm_password')[0].value;
        
        if (newPass !== confirmPass) {
            e.preventDefault();
            alert("Mật khẩu mới và xác nhận mật khẩu không khớp nhau!");
        }
    };
</script>
{% endblock %}
